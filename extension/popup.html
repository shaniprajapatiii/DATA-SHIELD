<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataShield</title>
  <style>
    /* ── Reset & Fonts ─────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 520px;
      background: #0a0e1a;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow-x: hidden;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      background: linear-gradient(135deg, #0d1b2a 0%, #112240 100%);
      border-bottom: 1px solid #1e3a5f;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      color: #38bdf8;
      letter-spacing: -0.3px;
    }
    .logo svg { width: 22px; height: 22px; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── URL bar ───────────────────────────────────────────────────────── */
    .url-bar {
      padding: 10px 16px;
      background: #0d1b2a;
      border-bottom: 1px solid #1e2d45;
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .url-bar span { color: #94a3b8; }

    /* ── Score Ring ────────────────────────────────────────────────────── */
    .score-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 12px;
      gap: 6px;
    }
    .score-ring-wrapper {
      position: relative;
      width: 120px; height: 120px;
    }
    .score-ring-wrapper svg { transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: #1e3a5f; stroke-width: 10; }
    .score-ring-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease, stroke 0.5s ease;
    }
    .score-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .score-number {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }
    .score-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
      opacity: 0.75;
    }
    .risk-badge {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* ── Tabs ──────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid #1e2d45;
      padding: 0 8px;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: #64748b;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 4px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: #38bdf8;
      border-bottom-color: #38bdf8;
    }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    /* ── Tab Content ───────────────────────────────────────────────────── */
    .tab-content { display: none; padding: 12px 16px; }
    .tab-content.active { display: block; }

    /* ── Permissions List ──────────────────────────────────────────────── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .permission-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      background: #0d1b2a;
      border: 1px solid #1e2d45;
    }
    .perm-icon { font-size: 15px; width: 20px; text-align: center; }
    .perm-name { flex: 1; font-size: 12px; font-weight: 500; }
    .perm-risk {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
    }
    .risk-critical { background: #450a0a; color: #f87171; }
    .risk-high     { background: #431407; color: #fb923c; }
    .risk-medium   { background: #422006; color: #fbbf24; }
    .risk-low      { background: #052e16; color: #4ade80; }

    /* ── Red Flags ─────────────────────────────────────────────────────── */
    .red-flag-item {
      padding: 9px 11px;
      border-radius: 8px;
      margin-bottom: 6px;
      border-left: 3px solid;
    }
    .flag-critical { background: #1c0505; border-color: #ef4444; }
    .flag-danger   { background: #1c0a05; border-color: #f97316; }
    .flag-warn     { background: #1a1505; border-color: #eab308; }
    .flag-info     { background: #05101c; border-color: #38bdf8; }
    .flag-category {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-bottom: 3px;
    }
    .flag-explanation { font-size: 11px; line-height: 1.5; }

    /* ── Summary Bullets ───────────────────────────────────────────────── */
    .bullet-list { list-style: none; }
    .bullet-list li {
      padding: 6px 0;
      font-size: 12px;
      line-height: 1.5;
      border-bottom: 1px solid #1e2d45;
      display: flex;
      gap: 8px;
    }
    .bullet-list li:last-child { border: none; }
    .bullet-list li::before {
      content: "›";
      color: #38bdf8;
      font-size: 14px;
      line-height: 1.4;
      flex-shrink: 0;
    }

    /* ── Action Buttons ────────────────────────────────────────────────── */
    .actions {
      padding: 10px 16px 14px;
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover   { opacity: 0.85; }
    .btn:active  { transform: scale(0.97); }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-ghost   { background: #1e2d45; color: #94a3b8; }

    /* ── Loading State ─────────────────────────────────────────────────── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 14px;
      color: #64748b;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #1e3a5f;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Not logged in ─────────────────────────────────────────────────── */
    .auth-prompt {
      padding: 30px 20px;
      text-align: center;
    }
    .auth-prompt h3 { color: #e2e8f0; margin-bottom: 8px; font-size: 14px; }
    .auth-prompt p  { color: #64748b; font-size: 12px; margin-bottom: 16px; line-height: 1.5; }
    .btn-login {
      display: inline-block;
      padding: 9px 24px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L3 6.5V12c0 4.97 3.9 9.24 9 10 5.1-.76 9-5.03 9-10V6.5L12 2z"
            fill="#0ea5e9" fill-opacity="0.2" stroke="#0ea5e9" stroke-width="1.5"/>
      <path d="M9 12l2 2 4-4" stroke="#0ea5e9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    DataShield
  </div>
  <div class="status-dot" id="statusDot" title="Engine online"></div>
</div>

<!-- ── URL Bar ─────────────────────────────────────────────────────────────── -->
<div class="url-bar">
  Scanning: <span id="currentUrl">—</span>
</div>

<!-- ── Main Content ────────────────────────────────────────────────────────── -->
<div id="mainContent">

  <!-- Loading -->
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div>Analysing privacy signals…</div>
  </div>

  <!-- Auth Prompt -->
  <div class="auth-prompt" id="authPrompt" style="display:none">
    <h3>🔐 Sign in to DataShield</h3>
    <p>Log in to scan websites, view your history, and get real-time risk alerts.</p>
    <button class="btn-login" id="loginBtn">Open DataShield</button>
  </div>

  <!-- Results -->
  <div id="resultsState" style="display:none">

    <!-- Score Ring -->
    <div class="score-section">
      <div class="score-ring-wrapper">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <circle class="score-ring-bg" cx="60" cy="60" r="50"/>
          <circle class="score-ring-fill" id="scoreRingFill"
                  cx="60" cy="60" r="50"
                  stroke-dasharray="314"
                  stroke-dashoffset="314"/>
        </svg>
        <div class="score-center">
          <div class="score-number" id="scoreNumber">—</div>
          <div class="score-label">RISK SCORE</div>
        </div>
      </div>
      <div class="risk-badge" id="riskBadge">Scanning…</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="permissions">Permissions</button>
      <button class="tab-btn" data-tab="redflags">Red Flags</button>
      <button class="tab-btn" data-tab="summary">Summary</button>
    </div>

    <!-- Permissions Tab -->
    <div class="tab-content active" id="tab-permissions">
      <div class="section-title">Detected API Access</div>
      <div id="permissionList"></div>
    </div>

    <!-- Red Flags Tab -->
    <div class="tab-content" id="tab-redflags">
      <div class="section-title">Policy Red Flags</div>
      <div id="redFlagList"></div>
    </div>

    <!-- Summary Tab -->
    <div class="tab-content" id="tab-summary">
      <div class="section-title">AI Summary</div>
      <div id="tldrText" style="font-size:12px;line-height:1.6;color:#94a3b8;margin-bottom:10px;"></div>
      <ul class="bullet-list" id="bulletList"></ul>
    </div>

  </div>
</div>

<!-- ── Action Buttons ──────────────────────────────────────────────────────── -->
<div class="actions">
  <button class="btn btn-primary" id="scanBtn">🔍 Full Scan</button>
  <button class="btn btn-ghost"   id="dashBtn">📊 Dashboard</button>
</div>

<script src="popup.js"></script>
</body>
</html>
